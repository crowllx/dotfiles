[global/wm]
include-file = modules.ini

[colors]
background = #000000
background-alt = #000000
foreground = #ADBAC7
primary = #539bf5
secondary = #b083f0
alert = #b083f0
disabled = #545d68

[bar/main]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = DevaVuSansM Nerd Font Mono;2
font-1 = FontAwesome;2
font-2 = MaterialIconsRound:pixelsize=18;5
modules-left = xworkspaces xwindow
modules-right = pulseaudio battery filesystem xkeyboard memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
